<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>ESAN - Trayectoria histórica</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body>

<a-scene>

  <a-assets>
    <img id="imgLobby" src="pasto.jpg">
    <img id="imgAuditorio" src="butacas.jpg">
    <img id="imgAuditorio2" src="butacas3.jpg"> 
    <video id="videoUni" src="video2.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
    <video id="videoFundador" src="video5.mp4" crossorigin="anonymous" playsinline webkit-playsinline preload="auto"></video>
  </a-assets>

  <a-sky id="skyPrincipal" src="#imgLobby" radius="40" rotation="0 -90 0"></a-sky>
  <a-sky id="skyButacas" src="#imgAuditorio" radius="40" rotation="0 -90 0" visible="false"></a-sky>

  <a-entity id="oscurecerButacas"
            geometry="primitive: sphere; radius: 39"
            material="shader: flat; color: black; side: back; transparent: true; opacity: 0"
            visible="false"
            animation__oscurecer="property: material.opacity; to: 0.85; dur: 5000; startEvents: luzOff"
            animation__aclarar="property: material.opacity; to: 0; dur: 1000; startEvents: luzOn">
  </a-entity>

  <a-entity id="grupoCine" look-at="[camera]" visible="false">
    
    <a-video id="pantallaVideo"
             src="#videoUni"
             width="30"
             height="15"
             material="shader: flat"
             animation__entrar="property: scale; from: 0 0 0; to: 1 1 1; dur: 3000; easing: easeOutQuad; startEvents: videoEntra"
             animation__salir="property: scale; to: 0 0 0; dur: 1500; easing: easeInBack; startEvents: videoSale">
    </a-video>

    <a-entity id="interfaz" position="0 -9 0.1">
      <a-plane id="barraFondo" width="20" height="0.4" color="#666"></a-plane>
      <a-plane id="barraProgreso" width="0.1" height="0.4" color="#E3173E" position="-10 0 0.01"></a-plane>
      <a-text id="textoDuracion" value="0:00 / 0:00" align="center" position="0 1.5 0" width="18" font="mozillavr"></a-text>

      <a-entity id="controles" position="0 -2.15 0">
        <a-circle id="btnSalir" class="clickable" radius="0.95" color="#696a6d" position="-7 0 0">
          <a-text value="Volver al\ninicio" align="center" baseline="center" width="2.5" font="mozillavr" wrap-count="15" position="0 0.12 0.05"></a-text>
        </a-circle>
        
        <a-circle id="btnRetro" class="clickable" radius="0.95" color="#696a6d" position="-3.5 0 0">
          <a-text value="-10s" align="center" baseline="center" width="2.5" font="mozillavr" wrap-count="10" position="0 0.12 0.05"></a-text>
        </a-circle>
        
        <a-circle id="btnPausa" class="clickable" radius="0.95" color="#E3173E" position="0 0 0">
          <a-text id="txtPausa" value="PAUSA" align="center" baseline="center" width="2.5" font="mozillavr" wrap-count="10" position="0 0.12 0.05"></a-text>
        </a-circle>
        
        <a-circle id="btnAvanzar" class="clickable" radius="0.95" color="#696a6d" position="3.5 0 0">
          <a-text value="+10s" align="center" baseline="center" width="2.5" font="mozillavr" wrap-count="10" position="0 0.12 0.05"></a-text>
        </a-circle>
        
        <a-circle id="btnReset" class="clickable" radius="0.95" color="#FFFFFF" position="6.5 0 0">
          <a-text value="Reiniciar" color="#000" align="center" baseline="center" width="2.5" font="mozillavr" wrap-count="10" position="0 0.12 0.05"></a-text>
        </a-circle>
      </a-entity>
    </a-entity>
  </a-entity>

  <a-entity id="contenedorBoton"
            position="-2 1.6 -15"
            animation="property: position; to: -2 1.6 -2.5; dur: 8000; easing: easeOutCubic; delay: 500">
    <a-circle id="btnAccion" class="clickable" color="#000" opacity="0.8" radius="0.8"
              animation__hover="property: scale; to: 1.2 1.2 1; dur: 200; startEvents: mouseenter"
              animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
      <a-text id="textoBoton" value="CONOCE NUESTRA\nHISTORIA" align="center" baseline="center" width="1" wrap-count="15" font="mozillavr" position="0 0 0.05"></a-text>
    </a-circle>
  </a-entity>

  <a-entity id="contenedorBotonFundador"
            position="2 1.6 -15"
            animation="property: position; to: 2 1.6 -2.5; dur: 8000; easing: easeOutCubic; delay: 500">
    <a-circle id="btnFundador" class="clickable" color="#000" opacity="0.8" radius="0.8"
              animation__hover="property: scale; to: 1.2 1.2 1; dur: 200; startEvents: mouseenter"
              animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
      <a-text id="textoBotonFundador" value="Descubre la historia del fundador de ESAN, Alan B. Coleman" align="center" baseline="center" width="1.2" wrap-count="20" font="mozillavr" position="0 0 0.05"></a-text>
    </a-circle>
  </a-entity>

  <a-entity id="rig">
    <a-entity id="camara" camera look-controls position="0 1.6 0">
      <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
    </a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 50" line="color: #FFD700"></a-entity>
    <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 50" line="color: #FFD700"></a-entity>
  </a-entity>

</a-scene>

<script>
const videoUni = document.querySelector('#videoUni');
const videoFundador = document.querySelector('#videoFundador');
let videoActual = videoUni;

const pantalla = document.querySelector('#pantallaVideo');
const grupoCine = document.querySelector('#grupoCine');
const contenedorBtn = document.querySelector('#contenedorBoton');
const contenedorBtnFundador = document.querySelector('#contenedorBotonFundador');
const textoBoton = document.querySelector('#textoBoton');
const textoBotonFundador = document.querySelector('#textoBotonFundador');
const skyPrincipal = document.querySelector('#skyPrincipal');
const skyButacas = document.querySelector('#skyButacas');
const oscurecerButacas = document.querySelector('#oscurecerButacas');
const barraProgreso = document.querySelector('#barraProgreso');
const textoDuracion = document.querySelector('#textoDuracion');
const txtPausa = document.querySelector('#txtPausa');
const camara = document.querySelector('#camara');

const btnAvanzar = document.querySelector('#btnAvanzar');
const btnRetro = document.querySelector('#btnRetro');
const txtAvanzar = btnAvanzar.querySelector('a-text');
const txtRetro = btnRetro.querySelector('a-text');

const ANCHO_BARRA = 20;
let saltoAvance = 10;
let saltoRetroceso = 10;

function actualizarBarra() {
  if (!videoActual || isNaN(videoActual.duration)) return;
  const progreso = videoActual.currentTime / videoActual.duration;
  barraProgreso.setAttribute('width', progreso * ANCHO_BARRA);
  barraProgreso.setAttribute('position', `${-ANCHO_BARRA / 2 + (progreso * ANCHO_BARRA) / 2} 0 0.01`);
  
  const m = Math.floor(videoActual.currentTime / 60);
  const s = Math.floor(videoActual.currentTime % 60).toString().padStart(2, '0');
  const md = Math.floor(videoActual.duration / 60);
  const sd = Math.floor(videoActual.duration % 60).toString().padStart(2, '0');
  textoDuracion.setAttribute('value', `${m}:${s} / ${md}:${sd}`);
}

videoUni.addEventListener('timeupdate', actualizarBarra);
videoFundador.addEventListener('timeupdate', actualizarBarra);

function iniciarCine(videoSeleccionado) {
  videoActual = videoSeleccionado;
  pantalla.setAttribute('src', `#${videoSeleccionado.id}`);
  pantalla.setAttribute('scale', '0 0 0'); // Asegura que inicie desde cero

  const rotation = camara.getAttribute('rotation');
  const angleY = rotation.y;
  
  if(videoSeleccionado.id === 'videoFundador') {
      skyButacas.setAttribute('src', '#imgAuditorio2');
      skyButacas.setAttribute('rotation', `0 ${angleY - 90} 0`); 
  } else {
      skyButacas.setAttribute('src', '#imgAuditorio');
      skyButacas.setAttribute('rotation', `0 ${angleY - 150} 0`);
  }

  const angleRad = (angleY * Math.PI) / 180;
  const posX = -25 * Math.sin(angleRad);
  const posZ = -25 * Math.cos(angleRad);
  
  grupoCine.setAttribute('position', `${posX} 2.5 ${posZ}`);

  contenedorBtn.setAttribute('visible', 'false');
  contenedorBtnFundador.setAttribute('visible', 'false');
  skyPrincipal.setAttribute('visible', 'false');
  skyButacas.setAttribute('visible', 'true');
  oscurecerButacas.setAttribute('visible', 'true');
  oscurecerButacas.emit('luzOff'); 

  videoActual.currentTime = 0;
  grupoCine.setAttribute('visible', 'true');

  setTimeout(() => {
    pantalla.emit('videoEntra');
    videoActual.play();
  }, 500);
}

document.querySelector('#btnAccion').addEventListener('click', () => { iniciarCine(videoUni); });
document.querySelector('#btnFundador').addEventListener('click', () => { iniciarCine(videoFundador); });

document.querySelector('#btnPausa').addEventListener('click', () => {
  if (videoActual.paused) { videoActual.play(); txtPausa.setAttribute('value', 'PAUSA'); } 
  else { videoActual.pause(); txtPausa.setAttribute('value', 'PLAY'); }
});

btnAvanzar.addEventListener('click', () => {
  if (videoActual && videoActual.duration) {
    saltoAvance += 10;
    saltoRetroceso = 10;
    videoActual.currentTime = Math.min(videoActual.currentTime + 10, videoActual.duration);
    actualizarBarra();
    txtAvanzar.setAttribute('value', `+${saltoAvance}s`);
    txtRetro.setAttribute('value', `-${saltoRetroceso}s`);
  }
});

btnRetro.addEventListener('click', () => {
  if (videoActual && videoActual.duration) {
    saltoRetroceso += 10;
    saltoAvance = 10;
    videoActual.currentTime = Math.max(videoActual.currentTime - 10, 0);
    actualizarBarra();
    txtRetro.setAttribute('value', `-${saltoRetroceso}s`);
    txtAvanzar.setAttribute('value', `+${saltoAvance}s`);
  }
});

document.querySelector('#btnReset').addEventListener('click', () => {
  videoActual.currentTime = 0; 
  videoActual.play();
  actualizarBarra();
  saltoAvance = 10; 
  saltoRetroceso = 10;
  txtAvanzar.setAttribute('value', '+10s');
  txtRetro.setAttribute('value', '-10s');
});

document.querySelector('#btnSalir').addEventListener('click', () => {
  videoActual.pause();
  videoActual.dispatchEvent(new Event('ended'));
});

// FUNCIÓN ACTUALIZADA CON CIERRE LENTO
function finalizarVideo() {
  // Emitimos el evento de cierre lento
  pantalla.emit('videoSale');

  // Esperamos 1.5 segundos a que la pantalla se encoga totalmente
  setTimeout(() => {
    grupoCine.setAttribute('visible', 'false');
    skyButacas.setAttribute('visible', 'false');
    skyPrincipal.setAttribute('visible', 'true');
    oscurecerButacas.emit('luzOn');
    oscurecerButacas.setAttribute('visible', 'false');
    
    if(videoActual.id === 'videoUni') {
      textoBoton.setAttribute('value', 'VUELVE A VER\nNUESTRA\nHISTORIA');
    } else {
      textoBotonFundador.setAttribute('value', 'Volver a ver la historia de Alan B. Coleman');
    }

    contenedorBtn.setAttribute('visible', 'true');
    contenedorBtnFundador.setAttribute('visible', 'true');
    
    // Reiniciar los botones para que entren desde lejos de nuevo
    const animOriginal = "property: position; to: -2 1.6 -2.5; dur: 6000; easing: easeOutCubic; delay: 500";
    const animFundador = "property: position; to: 2 1.6 -2.5; dur: 6000; easing: easeOutCubic; delay: 500";
    
    contenedorBtn.setAttribute('position', '-2 1.6 -15');
    contenedorBtnFundador.setAttribute('position', '2 1.6 -15');
    
    contenedorBtn.removeAttribute('animation');
    contenedorBtnFundador.removeAttribute('animation');
    
    setTimeout(() => { 
      contenedorBtn.setAttribute('animation', animOriginal); 
      contenedorBtnFundador.setAttribute('animation', animFundador);
    }, 50);

    saltoAvance = 10; saltoRetroceso = 10;
    txtAvanzar.setAttribute('value', '+10s');
    txtRetro.setAttribute('value', '-10s');
  }, 1500); // 1.5 segundos de espera
}

videoUni.addEventListener('ended', finalizarVideo);
videoFundador.addEventListener('ended', finalizarVideo);
</script>
</body>
</html>
